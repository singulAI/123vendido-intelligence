name: backend
on:
  pull_request:
  push:
    paths:
      - 'backend/**'
      - 'docs/**'
      - 'docker-compose.backend.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install -e 'backend[dev]'
      - run: pytest backend/tests
